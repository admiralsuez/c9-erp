version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud9-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cloud9-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud9-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: "24"
      REFRESH_TOKEN_EXPIRATION_DAYS: "30"
      CORS_ORIGINS: "https://erp.cloud9beverages.com"
    # Bind to localhost only - nginx is the public entrypoint
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/static/uploads
      - backend_backups:/app/backups
      - backend_logs:/app/logs
    restart: unless-stopped
    networks:
      - cloud9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path: requests go to the same origin (erp.cloud9beverages.com)
        # and nginx forwards /api/* to the backend. No mixed content, no CORS.
        VITE_API_URL: /api
    container_name: cloud9-frontend
    # Bind to localhost only - nginx is the public entrypoint
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cloud9-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_backups:
    driver: local
  backend_logs:
    driver: local

networks:
  cloud9-network:
    driver: bridge
