services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_password}
      POSTGRES_DB: ${DB_NAME:-erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - c9erp-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_password}@postgres:5432/${DB_NAME:-erp_db}
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required. Set it in .env or environment.}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      REFRESH_TOKEN_EXPIRATION_DAYS: 30
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    command: >
      sh -c "python setup_firstrun.py &&
             python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - c9erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - c9erp-network
    environment:
      - VITE_API_URL=http://64.227.191.1:8000

  caddy:
    image: caddy:2
    container_name: caddy
    volumes:
      - /root/apps/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - c9erp-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
networks:
  c9erp-network:
    driver: bridge
