name: cloud9-erp
services:
  - name: frontend
    github:
      branch: main
      repo: your-org/c9-erp
    source_dir: frontend
    build_command: npm install && npm run build
    environment_slug: node-js
    http_port: 3000
    envs:
      - key: VITE_API_URL
        value: https://api.cloud9beverages.com
    routes:
      - path: /
        component_name: frontend
    catchall_document: index.html
    health_check:
      http:
        path: /index.html
        port: 3000

  - name: backend
    github:
      branch: main
      repo: your-org/c9-erp
    source_dir: backend
    build_command: pip install --no-cache-dir -r requirements.txt
    run_command: ./start.sh
    http_port: 8000
    environment_slug: python
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${db.DATABASE_URL}
      - key: CORS_ORIGINS
        value: https://erp.cloud9beverages.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: REFRESH_TOKEN_EXPIRATION_DAYS
        value: "30"
    envs_from:
      - key: JWT_SECRET
        type: SECRET
        value: JWT_SECRET
    routes:
      - path: /api
        component_name: backend
    health_check:
      http:
        path: /health
        port: 8000
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 2
      failure_threshold: 3

databases:
  - name: db
    engine: PG
    production: true
    version: "16"

domains:
  - name: erp.cloud9beverages.com
    type: PRIMARY
    routes:
      - path: /
        component_name: frontend
  - name: api.cloud9beverages.com
    type: ALIAS
    routes:
      - path: /
        component_name: backend
