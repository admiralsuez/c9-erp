services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_password}
      POSTGRES_DB: ${DB_NAME:-erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - c9erp-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_password}@postgres:5432/${DB_NAME:-erp_db}
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required. Set it in .env or environment.}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      REFRESH_TOKEN_EXPIRATION_DAYS: 30
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    # Localhost-only bind: Caddy is the public entrypoint
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/static/uploads
      - backend_backups:/app/backups
    # Uses the image's start.sh: waits for DB, runs setup_firstrun.py
    # (non-blocking on failure), then starts uvicorn - no restart loops.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - c9erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative path baked into the JS bundle at BUILD time (runtime env
        # has no effect on Vite). Same-origin /api -> no mixed content.
        VITE_API_URL: /api
    container_name: erp_frontend
    # Localhost-only bind: Caddy is the public entrypoint (container serves on 3000)
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - c9erp-network

  caddy:
    image: caddy:2
    container_name: caddy
    volumes:
      # Caddyfile ships with the repo (caddy/Caddyfile) - no host-specific paths
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - c9erp-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  backend_logs:
  backend_uploads:
  backend_backups:
networks:
  c9erp-network:
    driver: bridge
