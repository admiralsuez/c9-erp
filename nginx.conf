# Nginx reverse proxy configuration for Cloud9 ERP
# Replace erp.cloud9beverages.com with your actual domain

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp.cloud9beverages.com;
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.cloud9beverages.com;
    
    # SSL certificate paths (generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/erp.cloud9beverages.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.cloud9beverages.com/privkey.pem;
    
    # SSL configuration (recommended by Mozilla)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logging
    access_log /var/log/nginx/cloud9-access.log;
    error_log /var/log/nginx/cloud9-error.log;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    gzip_vary on;
    
    # Frontend - SPA served by the frontend container (which handles the
    # index.html fallback itself). Do NOT use try_files here - this is a proxy.
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # API - Backend. The trailing slash on proxy_pass STRIPS the /api prefix:
    #   /api/settings  ->  http://localhost:8000/settings
    # (backend routes are unprefixed: /auth, /settings, /users, ...)
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Exact /api (no trailing path) -> backend root
    location = /api {
        return 301 /api/;
    }
    
    # Backend static uploads (served by FastAPI StaticFiles at /static)
    location /static/ {
        proxy_pass http://localhost:8000/static/;
        proxy_set_header Host $host;
    }
    
    # Health check endpoint (internal only)
    location /health {
        proxy_pass http://localhost:8000/health;
        access_log off;
    }
}
